<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - Protected Area</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f4f4f4;
        }
        .container {
            max-width: 800px;
            margin: 50px auto;
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
        }
        h1 {
            color: #333;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Welcome to the Protected Area</h1>
        <p>You have successfully logged in.</p>
        <p>This page is only accessible with a valid access cookie.</p>
        
        <!-- Add your protected content here -->
    </div>

    <script>
        // Function to get cookie by name
        function getCookie(name) {
            const value = `; ${document.cookie}`;
            const parts = value.split(`; ${name}=`);
            if (parts.length === 2) {
                let cookieValue = parts.pop().split(';').shift();
                return cookieValue;
            }
            return null;
        }

        // Function to validate and decode the obfuscated cookie
        function isValidAccessCookie() {
            const obfuscated = getCookie('accessData');
            if (!obfuscated) return false;

            try {
                // Reverse the obfuscation
                let reversed = obfuscated.split('').reverse().join('');
                // Shift characters back by -5
                let decoded = '';
                for (let char of reversed) {
                    decoded += String.fromCharCode(char.charCodeAt(0) - 5);
                }
                // Add back the = padding if needed
                while (decoded.length % 4) {
                    decoded += '=';
                }

                const data = atob(decoded);
                const expires = parseInt(data.split('=')[1]);

                if (isNaN(expires) || Date.now() > expires) {
                    return false; // Cookie expired
                }
                return true;
            } catch (e) {
                return false;
            }
        }

        // Check cookie and redirect if invalid/missing
        if (!isValidAccessCookie()) {
            window.location.href = "/"; // Redirect to base URL (root)
            // Alternative: window.location.href = "index.html"; // if you want specific page
        }
    </script>
</body>
</html>
